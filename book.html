<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment | EXPRESS RON</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#071d3f;
  --gold:#c7a052;
  --gold2:#e0c27b;
  --cream:#fbf7ef;
  --ink:#162033;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Lato,Arial,sans-serif;
  background:var(--cream);
  color:var(--ink);
}

/* NAVBAR (MATCH INDEX) */
header{
  background:var(--navy);
  padding:20px 0;
}

.container{
  width:min(1180px,calc(100% - 40px));
  margin:auto;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:white;
}

.brand img{
  width:48px;
}

.brand-title{
  font-family:"Cormorant Garamond",serif;
  font-size:26px;
  font-weight:700;
}

.nav-links{
  display:flex;
  gap:25px;
  align-items:center;
}

.nav-links a{
  color:white;
  text-decoration:none;
  font-weight:700;
}

.btn{
  padding:10px 18px;
  border-radius:5px;
  text-decoration:none;
  font-weight:900;
}

.btn-primary{
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:white;
}

/* HERO */
.hero{
  background:linear-gradient(rgba(7,29,63,.9),rgba(7,29,63,.9)),
  url("assets/hero-notary.png");
  background-size:cover;
  background-position:center;
  padding:100px 0 60px;
  text-align:center;
  color:white;
}

.hero h1{
  font-family:"Cormorant Garamond",serif;
  font-size:52px;
  margin-bottom:10px;
}

.hero p{
  opacity:.9;
}

/* BOOKING SECTION (MAIN FOCUS) */
.booking{
  padding:60px 0;
}

.booking-container{
  background:white;
  border-radius:14px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,.1);
  max-width:1000px;
  margin:auto;
}

/* makes tidycal feel full-width and premium */
.tidycal-embed{
  width:100%;
  min-height:650px;
}

/* FOOTER */
footer{
  background:#06172f;
  color:white;
  text-align:center;
  padding:25px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <div class="container nav">
    <a class="brand" href="index.html">
      <img src="assets/logo.png">
      <span class="brand-title">EXPRESS RON</span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#services">Services</a>
      <a href="index.html#how">How It Works</a>
      <a class="btn btn-primary" href="book.html">Book</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Book Your Appointment</h1>
    <p>Secure your remote notarization session in minutes.</p>
  </div>
</section>

<section class="booking">
  <div class="container">
    <div class="booking-container">

      <!-- TIDYCAL EMBED -->
      <div class="tidycal-embed" data-path="e-ronwa"></div>
      <script src="https://asset-tidycal.b-cdn.net/js/embed.js" async></script>

    </div>
  </div>
</section>

<footer>
  <p>© 2026 EXPRESS RON — Remote Online Notary</p>
</footer>

</body>
</html>
